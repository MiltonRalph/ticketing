apiVersion: apps/v1
kind: Deployment
metadata:
  name: expiration-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expiration
  template:
    metadata:
      labels:
        app: expiration
    spec:
      containers:
        - name: expiration
          image: eu.gcr.io/ticketing-dev-499819/expiration
          env:
            - name: REDIS_HOST
              value: expiration-redis-srv
            - name: NATS_URI
              value: 'nats-srv:4222'

